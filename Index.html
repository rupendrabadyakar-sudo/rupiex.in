rupix.in<!DOCTYPE html>
<html>
<head>
  <title>Rupix.in</title>
  <style>
    body { font-family: Arial; margin: 0; background: #f2f2f2; }
    header { background: black; color: white; padding: 15px; text-align: center; }
    .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
    .card {
      background: white; width: 200px; margin: 10px; padding: 10px;
      border-radius: 10px; text-align: center;
    }
    img { width: 100%; }
    button {
      background: black; color: white; padding: 8px;
      border: none; margin-top: 5px; cursor: pointer;
    }
    .admin {
      background: white;
      padding: 15px;
      margin: 20px;
      border-radius: 10px;
    }
    input {
      margin: 5px;
      padding: 8px;
    }
  </style>
</head>

<body>

<header>🛒 Rupix.in (Admin Panel)</header>

<div class="admin">
  <h3>Add Product</h3>
  <input id="name" placeholder="Product Name">
  <input id="price" placeholder="Price">
  <input id="image" placeholder="Image URL">
  <button onclick="addProduct()">Add</button>
</div>

<div class="container" id="products"></div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];

function displayProducts() {
  let html = "";
  products.forEach((p, index) => {
    html += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button onclick="deleteProduct(${index})">Delete</button>
      </div>
    `;
  });
  document.getElementById("products").innerHTML = html;
}

function addProduct() {
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let image = document.getElementById("image").value;

  if(name && price && image){
    products.push({name, price, image});
    localStorage.setItem("products", JSON.stringify(products));
    displayProducts();
  }
}

function deleteProduct(index) {
  products.splice(index, 1);
  localStorage.setItem("products", JSON.stringify(products));
  displayProducts();
}

displayProducts();
</script>

</body>
</html>
